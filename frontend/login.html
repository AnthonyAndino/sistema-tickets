<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraDesk - Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body split">
    <div class="login-split-container">
        <!-- Left Side: Form -->
        <div class="login-left">
            <div class="login-form-wrapper">
                <div class="login-header">
                    <div class="login-logo">
                        <i class="ph-fill ph-paper-plane-tilt"></i>
                    </div>
                    <h2>Bienvenido a AuraDesk</h2>
                    <p>Ingresa tus credenciales para acceder al portal</p>
                </div>
                
                <form id="loginForm" class="login-form">
                    <div class="input-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" placeholder="ej. anthony" required autocomplete="off">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-login">Ingresar <i class="ph-bold ph-arrow-right"></i></button>
                </form>
                <p id="error" class="error-msg"></p>
            </div>
        </div>
        
        <!-- Right Side: Graphic -->
        <div class="login-right">
            <div class="login-graphic">
                <div class="graphic-content">
                    <i class="ph-light ph-kanban"></i>
                    <h2>Gestión de Tickets de Clase Mundial</h2>
                    <p>AuraDesk te ayuda a centralizar, priorizar y resolver incidencias más rápido que nunca, con una interfaz que amarás usar todos los días.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
