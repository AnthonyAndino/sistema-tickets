<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dashboard de Estadísticas</h1>
        <p id="usuarioActivo"></p>
        <button onclick="logout()">Cerrar sesión</button>
    </header>

    <main>
        <section class="dashboard-container">
            <div class="stat-card">
                <h2>Total Tickets</h2>
                <p id="totalTickets" class="stat-number">0</p>
            </div>

            <div class="stat-card">
                <h2>Por Estado</h2>
                <div id="porEstado"></div>
            </div>

            <div class="stat-card">
                <h2>Top Técnicos</h2>
                <div id="porTecnico"></div>
            </div>

            <div class="stat-card">
                <h2>Tiempo Promedio</h2>
                <p id="tiempoPromedio" class="stat-number">N/A</p>
            </div>
        </section>

        <a href="index.html" class="back-link">← Volver a Tickets</a>
    </main>

    <div id="mensajes" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <script src="messages.js"></script>
    <script src="dashboard.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('rol');
            window.location.href = 'login.html';
        }

        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const rol = localStorage.getItem('rol');

        if (!token || rol !== 'admin') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('usuarioActivo').textContent = `Usuario: ${username} (${rol})`;
        }
    </script>
</body>
</html>
