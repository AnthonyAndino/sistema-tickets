<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Sistema de Tickets - Soporte TIC</h1>
        <p id="usuarioActivo"></p>

        <button onclick="logout()">Cerrar sesion</button>
    </header>

    <main>

        <section class="form-container">
            <h2>Crear Ticket</h2>

            <form id="ticketForm">
                <input type="text" id="titulo" placeholder="Titulo" required>
                <textarea id="descripcion" placeholder="Descripcion" required></textarea>
                <div id="asignarJefe" style="display:none;">
                    <label for="tecnico">Asignar a tecnico:</label>
                    <select id="tecnico">
                        <option value="">Seleccionar tecnico</option>
                    </select>
                </div>
                <button type="submit">Crear Ticket</button>
            </form>
        </section>

        <section>
            <h2>Tickets</h2>

            <div class="filtros">
                <button onclick="filtrar('todos')">Todos</button>
                <button onclick="filtrar('Pendiente')">Pendientes</button>
                <button onclick="filtrar('Resuelto')">Resueltos</button>
            </div>

            <div id="tickets" class="tickets-grid"></div>
        </section>

        <div id="ticketDetalle" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; z-index:1001; border-radius:8px;"></div>
        <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;" onclick="cerrarDetalle()"></div>

    </main>

    <script src="app.js"></script>
    <script src="authCheck.js"></script>

</body>

</html>
