<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sistema de Tickets - Soporte TIC</h1>
        <p id="usuarioActivo"></p>
        <button onclick="toggleDarkMode()">🌙</button>
        <button onclick="logout()">Cerrar sesión</button>
    </header>

    <main>
        <section class="form-container">
            <h2>Crear Ticket</h2>
            <form id="ticketForm">
                <input type="text" id="titulo" placeholder="Titulo" required>
                <textarea id="descripcion" placeholder="Descripcion" required></textarea>
                <select id="prioridad">
                    <option value="Baja">Baja</option>
                    <option value="Media" selected>Media</option>
                    <option value="Alta">Alta</option>
                    <option value="Urgente">Urgente</option>
                </select>
                <div id="asignarJefe" style="display:none;">
                    <label for="tecnico">Asignar a tecnico:</label>
                    <select id="tecnico">
                        <option value="">Seleccionar tecnico</option>
                    </select>
                </div>
                <button type="submit">Crear Ticket</button>
            </form>
        </section>

        <section>
            <h2>Tickets</h2>
            <div class="filtros">
                <input type="text" id="busqueda" placeholder="Buscar tickets..." style="padding:8px; border:1px solid #ddd; border-radius:5px;">
                <select id="filtroEstado">
                    <option value="">Todos los estados</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Resuelto">Resuelto</option>
                </select>
                <select id="filtroPrioridad">
                    <option value="">Todas las prioridades</option>
                    <option value="Urgente">Urgente</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
                <button onclick="aplicarFiltros()">Filtrar</button>
                <button onclick="limpiarFiltros()">Limpiar</button>
            </div>

            <div id="tickets" class="tickets-grid"></div>
        </section>

        <div id="ticketDetalle" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; z-index:1001; border-radius:8px;"></div>
        <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;" onclick="cerrarDetalle()"></div>
        
        <div id="editarTicket" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; z-index:1001; border-radius:8px;">
            <h3>Editar Ticket</h3>
            <form id="editForm">
                <input type="text" id="editTitulo" placeholder="Titulo" required>
                <textarea id="editDescripcion" placeholder="Descripcion" required></textarea>
                <select id="editEstado">
                    <option value="Pendiente">Pendiente</option>
                    <option value="Resuelto">Resuelto</option>
                </select>
                <label>Asignar Técnico:</label>
                <select id="editTecnico">
                    <option value="">Seleccionar tecnico</option>
                </select>
                <button type="submit">Guardar</button>
                <button type="button" onclick="cerrarEdicion()">Cancelar</button>
            </form>
        </div>

        <div id="comentariosSection" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; z-index:1001; border-radius:8px; max-height:80vh; overflow-y:auto;">
            <h3>Comentarios</h3>
            <div id="listaComentarios" style="margin:15px 0;"></div>
            <textarea id="nuevoComentario" placeholder="Agregar comentario..." style="width:100%; height:80px; margin-bottom:10px;"></textarea>
            <button onclick="agregarComentario()">Agregar</button>
            <button onclick="cerrarComentarios()">Cerrar</button>
        </div>
    </main>

    <div id="mensajes" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="messages.js"></script>
    <script src="notifications.js"></script>
    <script src="darkmode.js"></script>
    <script src="app.js"></script>
    <script src="authCheck.js"></script>
</body>
</html>
