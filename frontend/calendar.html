<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Sistema de Tickets</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />
</head>
<body>
    <header>
        <h1>Calendario de Tickets</h1>
        <p id="usuarioActivo"></p>
        <button onclick="logout()">Cerrar sesión</button>
    </header>

    <main>
        <div id="calendar"></div>
    </main>

    <div id="mensajes" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>
    <script src="messages.js"></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    <script src="calendar.js"></script>
    <script>
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('rol');
            window.location.href = 'login.html';
        }

        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const rol = localStorage.getItem('rol');

        if (!token || rol !== 'admin') {
            window.location.href = 'login.html';
        } else {
            document.getElementById('usuarioActivo').textContent = `Usuario: ${username} (${rol})`;
        }
    </script>
</body>
</html>
